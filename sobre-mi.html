<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre mí · SerElpis</title>
  <meta name="description" content="Conoce a Vanessa Luque, educadora social y terapeuta contextual detrás de SerElpis. Su formación, enfoque y el proyecto que da forma a este espacio de acompañamiento emocional." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --plum:        #6B3E5E;
      --plum-deep:   #4A2A40;
      --plum-soft:   #8F5A7A;
      --rosa:        #E8AABB;
      --rosa-pale:   #F5D9E2;
      --rosa-blush:  #FDF0F4;
      --cream:       #FBF7F4;
      --text-dark:   #0E0709;
      --text-mid:    #271626;
      --text-light:  #3E2438;
      --font: 'Cormorant Garamond', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(251, 247, 244, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(107, 62, 94, 0.08);
      transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(107,62,94,0.08); }
    .nav-logo {
      font-family: var(--font);
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--plum);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--plum); }
    .nav-cta {
      background: var(--plum);
      color: white !important;
      padding: 0.35rem 1rem;
      border-radius: 100px;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--plum-deep) !important; }
    .hamburger-line {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--plum);
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }

    /* ── PAGE HERO ── */
    .page-hero {
      padding: 10rem 4rem 5rem;
      background: white;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 80% at 90% 20%, rgba(232,170,187,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 30% 50% at 5% 90%, rgba(107,62,94,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .page-hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5rem;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* Photo */
    .hero-photo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }
    .hero-photo-frame {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 8px rgba(245,217,226,0.45),
        0 0 0 16px rgba(245,217,226,0.18),
        0 20px 60px rgba(107,62,94,0.18);
      border: 2px solid rgba(107,62,94,0.08);
      flex-shrink: 0;
    }
    .hero-photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      filter: saturate(0.88) brightness(1.02);
    }
    .hero-name-block {
      text-align: center;
      padding: 1rem 1.4rem;
      background: var(--rosa-blush);
      border-radius: 14px;
      border: 1px solid var(--rosa-pale);
      width: 100%;
    }
    .hero-name {
      font-family: var(--font);
      font-size: 1.6rem;
      font-weight: 500;
      font-style: italic;
      color: var(--plum-deep);
      display: block;
    }
    .hero-role {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-light);
      display: block;
      margin-top: 0.15rem;
      letter-spacing: 0.05em;
    }

    /* Text side */
    .hero-text { display: flex; flex-direction: column; gap: 1.6rem; }
    .page-eyebrow {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--plum-soft);
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .page-eyebrow::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--rosa);
    }
    .page-title {
      font-family: var(--font);
      font-size: clamp(2.8rem, 5vw, 5rem);
      font-weight: 300;
      line-height: 1.08;
      color: var(--plum-deep);
      letter-spacing: -0.02em;
    }
    .page-title em { font-style: italic; color: var(--plum-soft); }
    .page-intro {
      font-size: 1.25rem;
      line-height: 1.85;
      color: var(--text-mid);
      max-width: 56ch;
      font-weight: 400;
    }
    .btn-primary {
      background: var(--plum);
      color: white;
      padding: 0.85rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      display: inline-block;
      align-self: flex-start;
    }
    .btn-primary:hover { background: var(--plum-deep); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,42,64,0.25); }

    /* ── SECTION SHARED ── */
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label {
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.12em;
      color: var(--plum-soft);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--rosa);
    }
    .section-title {
      font-family: var(--font);
      font-size: clamp(1.9rem, 2.8vw, 2.8rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--plum-deep);
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }
    .section-title em { font-style: italic; color: var(--plum-soft); }

    /* ── BIO SECTION ── */
    .bio { background: white; padding: 6rem 4rem 7rem; }
    .bio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
    }
    .bio-text p {
      font-size: 1.25rem;
      line-height: 1.9;
      color: var(--text-mid);
      margin-bottom: 1.4rem;
    }
    .bio-text p:last-child { margin-bottom: 0; }

    /* Values */
    .values-list {
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }
    .value-item {
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
    }
    .value-number {
      font-family: var(--font);
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--rosa);
      line-height: 1;
      flex-shrink: 0;
      width: 2.5rem;
      text-align: right;
      padding-top: 0.1rem;
    }
    .value-text strong {
      display: block;
      font-family: var(--font);
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--plum-deep);
      margin-bottom: 0.3rem;
    }
    .value-text p {
      font-size: 1.12rem !important;
      line-height: 1.7 !important;
      color: var(--text-mid) !important;
      font-weight: 300 !important;
      margin: 0 !important;
    }

    /* ── FORMATION STRIP ── */
    .formation {
      background: var(--rosa-blush);
      padding: 6rem 4rem;
    }
    .formation-header { margin-bottom: 3.5rem; }
    .formation-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    .formation-card {
      background: white;
      border-radius: 18px;
      padding: 2.2rem 2rem;
      border: 1px solid rgba(107,62,94,0.07);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .formation-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--rosa) 0%, var(--plum-soft) 100%);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .formation-card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(107,62,94,0.1); }
    .formation-card:hover::after { transform: scaleX(1); }
    .formation-icon {
      font-size: 1.7rem;
      margin-bottom: 1.2rem;
      display: block;
    }
    .formation-title {
      font-family: var(--font);
      font-size: 1.5rem;
      font-weight: 500;
      font-style: italic;
      color: var(--plum-deep);
      margin-bottom: 0.8rem;
      line-height: 1.2;
    }
    .formation-desc {
      font-family: var(--font);
      font-size: 1.1rem;
      line-height: 1.75;
      color: var(--text-mid);
    }

    /* ── PROJECT SECTION ── */
    .project {
      background: white;
      padding: 6rem 4rem 7rem;
    }
    .project-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
    }
    .project-sticky {
      position: sticky;
      top: 7rem;
    }
    .project-deco {
      width: 100%;
      aspect-ratio: 1;
      max-width: 420px;
      border-radius: 24px;
      background: var(--rosa-blush);
      border: 1px solid var(--rosa-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .project-deco::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 30%, rgba(232,170,187,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(107,62,94,0.08) 0%, transparent 65%);
    }
    .project-deco-quote {
      font-family: var(--font);
      font-size: 1.4rem;
      font-weight: 400;
      font-style: italic;
      color: var(--plum-deep);
      text-align: center;
      line-height: 1.55;
      padding: 2.5rem;
      position: relative;
      z-index: 1;
    }
    .project-deco-quote span {
      display: block;
      font-size: 0.85rem;
      font-style: normal;
      letter-spacing: 0.1em;
      color: var(--plum-soft);
      margin-top: 1.2rem;
    }

    .project-text p {
      font-size: 1.25rem;
      line-height: 1.9;
      color: var(--text-mid);
      margin-bottom: 1.4rem;
    }
    .project-text p:last-child { margin-bottom: 0; }

    /* ── MANIFESTO ── */
    .manifesto {
      background: var(--plum-deep);
      padding: 6rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .manifesto::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 30% 50%, rgba(232,170,187,0.06) 0%, transparent 70%);
    }
    .manifesto-quote {
      font-family: var(--font);
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      font-weight: 400;
      font-style: italic;
      color: rgba(245,217,226,0.95);
      max-width: 780px;
      margin: 0 auto 1.4rem;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }
    .manifesto-sub {
      font-family: var(--font);
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      color: rgba(232,170,187,0.45);
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    /* ── CTA ── */
    .cta-band {
      background: var(--cream);
      padding: 6rem 4rem;
      text-align: center;
    }
    .cta-band .section-label { justify-content: center; }
    .cta-band .section-title { text-align: center; }
    .cta-band p {
      font-size: 1.2rem;
      line-height: 1.8;
      color: var(--text-mid);
      max-width: 50ch;
      margin: 0 auto 2.5rem;
    }
    .cta-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-secondary {
      border: 1.5px solid var(--rosa);
      color: var(--plum);
      padding: 0.85rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      display: inline-block;
    }
    .btn-secondary:hover { border-color: var(--plum); background: var(--rosa-blush); transform: translateY(-2px); }

    /* ── FOOTER ── */
    footer {
      background: var(--plum-deep);
      color: rgba(245,217,226,0.55);
      padding: 2.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-brand { font-family: var(--font); font-size: 1.3rem; color: rgba(245,217,226,0.9); }
    .footer-links { display: flex; gap: 2rem; list-style: none; }
    .footer-links a {
      font-family: var(--font);
      font-size: 0.92rem;
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--rosa); }
    .footer-copy { font-family: var(--font); font-size: 0.86rem; font-style: italic; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .hero-photo-wrap { animation: fadeUp 0.8s ease both; }
    .hero-text { animation: fadeUp 0.9s 0.15s ease both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      #menu-toggle { display: flex !important; }
      .nav-links.open {
        display: flex;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(251, 247, 244, 0.97);
        backdrop-filter: blur(14px);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        z-index: 99;
      }
      .nav-links.open a { font-size: 1.6rem; }
      #menu-toggle.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      #menu-toggle.open .hamburger-line:nth-child(2) { opacity: 0; }
      #menu-toggle.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

      .page-hero { padding: 8rem 1.5rem 4rem; }
      .page-hero-inner { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .hero-photo-wrap { margin: 0 auto; }
      .page-eyebrow { justify-content: center; }
      .btn-primary { align-self: center; }

      .bio { padding: 5rem 1.5rem; }
      .bio-grid { grid-template-columns: 1fr; gap: 3.5rem; }

      .formation { padding: 5rem 1.5rem; }
      .formation-grid { grid-template-columns: 1fr; }

      .project { padding: 5rem 1.5rem; }
      .project-layout { grid-template-columns: 1fr; gap: 3rem; }
      .project-sticky { position: static; }
      .project-deco { max-width: 100%; }

      .cta-band { padding: 5rem 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
      .footer-links { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <div style="max-width:1100px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="nav-logo">SerElpis</a>
    <button id="menu-toggle" aria-label="Abrir menú" style="display:none;background:none;border:none;cursor:pointer;padding:0.4rem;flex-direction:column;gap:5px;">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="sobre-mi.html" style="color:var(--plum);font-weight:500;">Sobre mí</a></li>
      <li><a href="index.html#sesiones">Sesiones</a></li>
      <li><a href="index.html#como-funciona">Cómo funciona</a></li>
      <li><a href="index.html#faq">Preguntas frecuentes</a></li>
      <li><a href="index.html#contacto" class="nav-cta">Contacta</a></li>
    </ul>
  </div>
</nav>

<!-- PAGE HERO -->
<section class="page-hero">
  <div class="page-hero-inner">
    <div class="hero-photo-wrap">
      <div class="hero-photo-frame">
