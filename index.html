<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SerElpis · Educación Emocional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --plum:        #6B3E5E;
      --plum-deep:   #351e2e; /* Más oscuro */
      --plum-soft:   #8F5A7A;
      --rosa:        #E8AABB;
      --rosa-pale:   #F5D9E2;
      --rosa-blush:  #FDF0F4;
      --cream:       #FBF7F4;
      --text-dark:   #1A0F15; /* Más oscuro */
      --text-mid:    #3d2934; /* Más oscuro */
      --text-light:  #7a5f6c; /* Más oscuro */
      --font: 'Cormorant Garamond', serif;
      --max-w: 1000px; /* Reducido para mejorar centrado visual */
      --pad-x: clamp(1.5rem, 5vw, 6rem);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
      font-size: 21px; /* Más grande */
      line-height: 1.7;
      text-align: center; /* Centrado global */
    }

    /* NAV  */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem var(--pad-x);
      background: rgba(251, 247, 244, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(107, 62, 94, 0.08);
    }

    .nav-logo {
      font-family: var(--font);
      font-size: 1.8rem;
      font-weight: 600; /* Más ancho/negrita */
      color: var(--plum);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text-mid);
      text-decoration: none;
    }

    .nav-cta {
      background: var(--plum) !important;
      color: white !important;
      padding: 0.55rem 1.6rem;
      border-radius: 100px;
    }

    /* HERO  */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8rem var(--pad-x) 4rem;
      max-width: var(--max-w);
      margin: 0 auto;
    }

    .hero-brand {
      font-size: clamp(4rem, 8vw, 7rem);
      font-weight: 400;
      color: var(--plum-deep);
      margin-bottom: 0.6rem;
    }
    .hero-brand::after {
      content: '';
      display: block;
      width: 4rem;
      height: 2px;
      background: var(--rosa);
      margin: 1rem auto 1.8rem; /* Centrado */
    }

    .hero-title {
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 2rem;
    }

    .hero-desc {
      font-size: 1.35rem;
      font-weight: 400;
      max-width: 40ch;
      margin: 0 auto 2.5rem;
    }

    .hero-actions {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
    }

    /* BTNS  */
    .btn-primary, .btn-secondary {
      padding: 1rem 2.5rem;
      border-radius: 100px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary { background: var(--plum); color: white; }
    .btn-secondary { border: 2px solid var(--rosa); color: var(--plum); }

    /* SECTION COMMON  */
    .section-inner {
      max-width: 800px; /* Más estrecho para mejor lectura centrada */
      margin: 0 auto;
      padding: 0 var(--pad-x);
    }

    .section-label {
      font-size: 1.1rem;
      font-style: italic;
      color: var(--plum-soft);
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
    }

    .section-title {
      font-size: clamp(2.5rem, 4vw, 3.5rem);
      font-weight: 400;
      color: var(--plum-deep);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    /* REESTRUCTURACIÓN SOBRE MÍ  */
    .about { background: white; padding: 8rem 0; }
    
    .about-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .about-description {
      max-width: 700px;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--text-dark);
    }

    .about-photo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .photo-circle {
      width: 280px;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--rosa-pale);
      box-shadow: 0 20px 60px rgba(107,62,94,0.15);
    }
    .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

    .photo-info { margin-top: 0.5rem; }
    .photo-name { font-size: 1.6rem; font-weight: 600; color: var(--plum-deep); }
    .photo-role { font-size: 1.1rem; color: var(--text-light); font-style: italic; }

    .highlight-title {
      font-size: clamp(2.8rem, 5vw, 4rem);
      line-height: 1.1;
      color: var(--plum-deep);
      font-weight: 300;
      margin: 2rem 0;
    }

    .about-values-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      max-width: 650px;
      text-align: center;
    }
    
    .value-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .value-text strong { font-size: 1.5rem; color: var(--plum-deep); display: block; margin-bottom: 0.5rem; }
    .value-text p { font-size: 1.15rem; color: var(--text-mid); }

    /* SERVICES / HOW  */
    .services, .how, .contact { padding: 8rem 0; }
    .services-grid {
      display: grid;
      grid-template-columns: 1fr; /* Centrado vertical para impacto */
      gap: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .service-card {
      background: white;
      padding: 3rem;
      border-radius: 24px;
      border: 1px solid rgba(107,62,94,0.1);
    }

    .steps {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem
